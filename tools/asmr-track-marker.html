<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ASMR Track Marker — Queen's Empire</title>
<style>
  :root {
    --bg: #080808;
    --surface: #111;
    --border: #2a2a2a;
    --gold: #C9A84C;
    --text: #e0ddd5;
    --text-dim: #999;
    --red: #c0392b;
    --orange: #d35400;
    --yellow: #b7950b;
    --blue: #2980b9;
    --purple: #8e44ad;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100dvh; display: flex; flex-direction: column;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }
  .header {
    padding: 16px 20px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .header h1 { font-size: 1.1rem; font-weight: 600; color: var(--gold); letter-spacing: 0.02em; }
  .header .track-label { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; }

  /* Player */
  .player-zone {
    padding: 12px 16px;
    display: flex; flex-direction: column; gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .file-row {
    display: flex; gap: 8px; align-items: center;
  }
  .file-row input[type="file"] { display: none; }
  .btn-load {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--gold); padding: 10px 16px; border-radius: 6px;
    font-size: 0.85rem; font-weight: 600; cursor: pointer;
  }
  .btn-load:active { background: #1a1a15; }
  .btn-load.loaded { border-color: var(--gold); color: #4a4; }
  audio {
    width: 100%; height: 40px; border-radius: 6px;
    background: var(--surface);
  }
  .time-display {
    text-align: center; font-size: 1.6rem; font-weight: 700;
    color: var(--gold); font-variant-numeric: tabular-nums;
    padding: 4px 0; letter-spacing: 0.03em;
  }

  /* Buttons */
  .marker-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 14px 16px;
    flex: 1;
  }
  .marker-grid.single-col { grid-template-columns: 1fr; }
  .mark-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; padding: 16px 8px;
    border: 2px solid var(--border); border-radius: 12px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.82rem; font-weight: 600;
    cursor: pointer;
    transition: all 0.1s ease;
    min-height: 72px;
  }
  .mark-btn .icon { font-size: 1.5rem; }
  .mark-btn .label { font-size: 0.72rem; color: var(--text-dim); }
  .mark-btn:active {
    transform: scale(0.94);
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.3);
  }
  .mark-btn.buzz { border-left: 3px solid var(--red); }
  .mark-btn.word { border-left: 3px solid var(--orange); }
  .mark-btn.fast { border-left: 3px solid var(--yellow); }
  .mark-btn.seduce { border-left: 3px solid var(--purple); }
  .mark-btn.loud { border-left: 3px solid var(--blue); }

  /* Log */
  .log-section {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    max-height: 200px; overflow-y: auto;
  }
  .log-section h3 {
    font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 8px;
  }
  .log-entry {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid #1a1a1a;
    font-size: 0.78rem;
  }
  .log-entry .ts { color: var(--gold); font-weight: 700; font-variant-numeric: tabular-nums; min-width: 58px; }
  .log-entry .tag { font-size: 0.68rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .tag-buzz { background: #3b1212; color: #e74c3c; }
  .tag-word { background: #3b2012; color: #e67e22; }
  .tag-fast { background: #3b3512; color: #f1c40f; }
  .tag-seduce { background: #2a123b; color: #9b59b6; }
  .tag-loud { background: #122a3b; color: #3498db; }

  /* Actions */
  .action-bar {
    display: flex; gap: 8px; padding: 10px 16px 20px;
    border-top: 1px solid var(--border);
  }
  .btn {
    flex: 1; padding: 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 0.8rem; font-weight: 600;
    cursor: pointer; text-align: center;
  }
  .btn.primary { border-color: var(--gold); color: var(--gold); }
  .btn.danger { color: var(--red); border-color: #3b1212; }
  .btn:active { transform: scale(0.96); }

  /* Toast */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--gold); color: #09090b; padding: 10px 24px;
    border-radius: 20px; font-weight: 700; font-size: 0.78rem;
    opacity: 0; pointer-events: none; z-index: 999;
    transition: opacity 0.25s, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
</style>
</head>
<body>

<div class="header">
  <h1>♛ ASMR Track Marker</h1>
  <div class="track-label" id="trackLabel">No track loaded</div>
</div>

<div class="player-zone">
  <div class="file-row">
    <input type="file" id="fileInput" accept="audio/*">
    <button class="btn-load" id="btnLoad" onclick="quickLoad()">⚡ Quick Load SR-01</button>
  </div>
  <audio id="player" controls controlslist="nodownload"></audio>
  <div class="time-display" id="timeDisplay">0:00</div>
</div>

<div class="marker-grid" id="markerGrid">
  <button class="mark-btn buzz" onclick="mark('buzz')">
    <span class="icon">🐝</span> Buzz / Static
    <span class="label">Audio glitch</span>
  </button>
  <button class="mark-btn word" onclick="mark('word')">
    <span class="icon">💬</span> Bad Word
    <span class="label">Wrong tone / commanding</span>
  </button>
  <button class="mark-btn fast" onclick="mark('fast')">
    <span class="icon">⚡</span> Too Fast
    <span class="label">Rushing / not paced</span>
  </button>
  <button class="mark-btn seduce" onclick="mark('seduce')">
    <span class="icon">💤</span> Not Seductive
    <span class="label">Flat / clinical / cold</span>
  </button>
  <button class="mark-btn loud" onclick="mark('loud')">
    <span class="icon">🔊</span> Too Loud
    <span class="label">Volume spike</span>
  </button>
</div>

<div class="log-section" id="logSection" style="display:none">
  <h3>📋 Marks (<span id="markCount">0</span>)</h3>
  <div id="logEntries"></div>
</div>

<div class="action-bar">
  <button class="btn primary" onclick="copyLog()">📋 Copy to Discord</button>
  <button class="btn" onclick="undoLast()">↩ Undo</button>
  <button class="btn danger" onclick="clearAll()">✕ Clear</button>
</div>

<div class="toast" id="toast"></div>

<script>
const player = document.getElementById('player');
const timeDisplay = document.getElementById('timeDisplay');
const trackLabel = document.getElementById('trackLabel');
const logSection = document.getElementById('logSection');
const logEntries = document.getElementById('logEntries');
const markCount = document.getElementById('markCount');
const btnLoad = document.getElementById('btnLoad');
let marks = [];

// Load saved marks from localStorage (survives browser backgrounding)
try {
  const saved = localStorage.getItem('qe-marks');
  if (saved) { marks = JSON.parse(saved); renderLog(); }
} catch(e) {}

const LS_KEY = 'qe-marks';

// Format seconds to M:SS
function fmt(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ':' + String(s).padStart(2, '0');
}

// Update time display
player.addEventListener('timeupdate', () => {
  timeDisplay.textContent = fmt(player.currentTime);
});

// File load
document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  player.src = url;
  trackLabel.textContent = file.name;
  btnLoad.textContent = '✅ Loaded';
  btnLoad.classList.add('loaded');
  marks = [];
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
  renderLog();
});

// Quick Load: fetch audio from same directory as this HTML
async function quickLoad() {
  const audioUrl = 'SR-01 - The First Chime.mp3';
  trackLabel.textContent = 'Loading...';
  btnLoad.textContent = '⏳ Loading';
  try {
    const resp = await fetch(audioUrl, { method: 'HEAD' });
    if (resp.ok) {
      player.src = audioUrl;
      trackLabel.textContent = 'SR-01 - The First Chime';
      btnLoad.textContent = '✅ Ready';
      btnLoad.classList.add('loaded');
      marks = [];
      try { localStorage.removeItem(LS_KEY); } catch(e) {}
      renderLog();
      showToast('✅ SR-01 loaded — press play');
    } else {
      throw new Error('Not found');
    }
  } catch(e) {
    trackLabel.textContent = 'No track — tap folder icon instead';
    btnLoad.textContent = '📂 Load Track';
    showToast('⚠ Quick load failed — use Load Track');
  }
}

// Mark
function mark(type) {
  if (!player.src || player.src === window.location.href) {
    showToast('⚠ Load a track first');
    return;
  }
  const t = player.currentTime;
  if (t < 0.1) { showToast('⚠ Start playing first'); return; }
  marks.push({ time: t, type: type });
  marks.sort((a, b) => a.time - b.time);
  renderLog();
  showToast('✓ Marked ' + getLabel(type) + ' at ' + fmt(t));
}

function getLabel(type) {
  const map = { buzz: 'Buzz', word: 'Bad Word', fast: 'Too Fast', seduce: 'Not Seductive', loud: 'Too Loud' };
  return map[type] || type;
}

function renderLog() {
  if (marks.length === 0) {
    logSection.style.display = 'none';
    return;
  }
  logSection.style.display = 'block';
  markCount.textContent = marks.length;
  try { localStorage.setItem(LS_KEY, JSON.stringify(marks)); } catch(e) {}
  logEntries.innerHTML = marks.map((m, i) =>
    `<div class="log-entry">
      <span class="ts">${fmt(m.time)}</span>
      <span class="tag tag-${m.type}">${getLabel(m.type)}</span>
      <span style="color:var(--text-dim);font-size:0.65rem" onclick="removeMark(${i})">✕</span>
    </div>`
  ).join('');
}

function removeMark(i) {
  marks.splice(i, 1);
  renderLog();
  showToast('Removed');
}

function undoLast() {
  if (marks.length === 0) { showToast('Nothing to undo'); return; }
  const last = marks.pop();
  renderLog();
  showToast('↩ Undid ' + getLabel(last.type) + ' at ' + fmt(last.time));
}

function clearAll() {
  if (marks.length === 0) return;
  if (!confirm('Clear all ' + marks.length + ' marks?')) return;
  marks = [];
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
  renderLog();
  showToast('Cleared all marks');
}

function copyLog() {
  if (marks.length === 0) { showToast('No marks to copy'); return; }
  const track = trackLabel.textContent === 'No track loaded' ? 'Track' : trackLabel.textContent;
  let text = `📋 **${track}** — ${marks.length} marks\n`;
  marks.forEach(m => {
    text += `- \`${fmt(m.time)}\` ${getLabel(m.type)}\n`;
  });
  navigator.clipboard.writeText(text).then(() => {
    showToast('📋 Copied! Paste in Discord');
  }).catch(() => {
    showToast('⚠ Copy failed — tap entries to screenshot');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 1800);
}

// Keyboard: space to play/pause, 1-5 to mark
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); player.paused ? player.play() : player.pause(); }
  const keys = { 'Digit1': 'buzz', 'Digit2': 'word', 'Digit3': 'fast', 'Digit4': 'seduce', 'Digit5': 'loud' };
  if (keys[e.code]) mark(keys[e.code]);
});
</script>
</body>
</html>
